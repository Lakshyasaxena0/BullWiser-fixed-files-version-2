[build]
  command = "npm run build:client"
  publish = "dist/public"

[build.environment]
  NODE_VERSION = "20"

[context.deploy-preview]
  command = "npm run build:client"

[context.branch-deploy]
  command = "npm run build:client"

# ── Proxy API calls to Render backend ─────────────────────────────────────────
# This completely eliminates CORS. The browser calls /api/* on Netlify,
# Netlify forwards the request to Render, returns the response.
# From the browser's perspective it's always the same origin — no CORS needed.
[[redirects]]
  from   = "/api/*"
  to     = "https://bullwiser-fixed-files-version-2-backend.onrender.com/api/:splat"
  status = 200
  force  = true

# SPA catch-all
[[redirects]]
  from   = "/*"
  to     = "/index.html"
  status = 200

[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options        = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy        = "strict-origin-when-cross-origin"
    Permissions-Policy     = "camera=(), microphone=(), geolocation=()"

[[headers]]
  for = "/assets/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
