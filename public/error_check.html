<!DOCTYPE html>
<html>
<head>
    <title>BullWiser Error Check</title>
    <meta charset="UTF-8">
    <style>
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            max-width: 1200px;
            margin: 0 auto;
            padding: 20px;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
        }
        .container {
            background: white;
            border-radius: 12px;
            padding: 30px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
        }
        h1 { 
            color: #333;
            border-bottom: 3px solid #667eea;
            padding-bottom: 10px;
        }
        .status-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(250px, 1fr));
            gap: 20px;
            margin: 20px 0;
        }
        .status-card {
            padding: 20px;
            border-radius: 8px;
            background: #f8f9fa;
            border-left: 4px solid #dee2e6;
        }
        .status-card.success {
            border-left-color: #28a745;
            background: #d4edda;
        }
        .status-card.error {
            border-left-color: #dc3545;
            background: #f8d7da;
        }
        .status-card.warning {
            border-left-color: #ffc107;
            background: #fff3cd;
        }
        .icon {
            font-size: 24px;
            margin-right: 10px;
        }
        pre {
            background: #f4f4f4;
            padding: 15px;
            border-radius: 5px;
            overflow-x: auto;
        }
        .error-display {
            background: #ffebee;
            border: 1px solid #ffcdd2;
            border-radius: 5px;
            padding: 15px;
            color: #c62828;
            margin: 20px 0;
        }
        .login-form {
            background: #f0f8ff;
            padding: 20px;
            border-radius: 8px;
            margin: 20px 0;
        }
        button {
            background: #667eea;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
        }
        button:hover {
            background: #5a67d8;
        }
        input {
            width: 100%;
            padding: 8px;
            margin: 5px 0;
            border: 1px solid #ddd;
            border-radius: 4px;
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>🐂 BullWiser - System Status & Error Check</h1>
        
        <div class="status-grid" id="status-grid">
            <div class="status-card" id="server-status">
                <h3><span class="icon">🖥️</span>Server Status</h3>
                <p>Checking...</p>
            </div>
            <div class="status-card" id="auth-status">
                <h3><span class="icon">🔐</span>Authentication</h3>
                <p>Checking...</p>
            </div>
            <div class="status-card" id="api-status">
                <h3><span class="icon">📊</span>API Status</h3>
                <p>Checking...</p>
            </div>
            <div class="status-card" id="react-status">
                <h3><span class="icon">⚛️</span>React App</h3>
                <p>Checking...</p>
            </div>
        </div>
        
        <div id="error-section" style="display:none;">
            <h2>⚠️ Error Details</h2>
            <div class="error-display" id="error-display"></div>
        </div>
        
        <div class="login-form">
            <h2>🔑 Quick Login Test</h2>
            <p>Test with: testuser / password123</p>
            <input type="text" id="username" placeholder="Username" value="testuser">
            <input type="password" id="password" placeholder="Password" value="password123">
            <button onclick="testLogin()">Test Login</button>
            <button onclick="checkAuth()">Check Current Auth</button>
            <button onclick="logout()">Logout</button>
        </div>
        
        <div id="response-section">
            <h2>📋 Response Details</h2>
            <pre id="response"></pre>
        </div>
    </div>
    
    <script>
        // Check server status
        fetch('/')
            .then(res => {
                const card = document.getElementById('server-status');
                if (res.ok) {
                    card.className = 'status-card success';
                    card.innerHTML = '<h3><span class="icon">✅</span>Server Status</h3><p>Server is running on port 5000</p>';
                } else {
                    card.className = 'status-card error';
                    card.innerHTML = '<h3><span class="icon">❌</span>Server Status</h3><p>Server error: ' + res.status + '</p>';
                }
                return res.text();
            })
            .then(html => {
                // Check if React is loading
                const card = document.getElementById('react-status');
                if (html.includes('root') && html.includes('vite')) {
                    card.className = 'status-card success';
                    card.innerHTML = '<h3><span class="icon">✅</span>React App</h3><p>React app is loading</p>';
                } else {
                    card.className = 'status-card warning';
                    card.innerHTML = '<h3><span class="icon">⚠️</span>React App</h3><p>React app may have issues</p>';
                }
            })
            .catch(err => {
                document.getElementById('server-status').className = 'status-card error';
                document.getElementById('server-status').innerHTML = '<h3><span class="icon">❌</span>Server Status</h3><p>Cannot connect: ' + err.message + '</p>';
            });
        
        // Check authentication
        fetch('/api/auth/user', {credentials: 'include'})
            .then(res => {
                const card = document.getElementById('auth-status');
                if (res.status === 401) {
                    card.className = 'status-card warning';
                    card.innerHTML = '<h3><span class="icon">🔓</span>Authentication</h3><p>Not logged in (401 - Normal)</p>';
                } else if (res.ok) {
                    card.className = 'status-card success';
                    card.innerHTML = '<h3><span class="icon">✅</span>Authentication</h3><p>User is authenticated</p>';
                } else {
                    card.className = 'status-card error';
                    card.innerHTML = '<h3><span class="icon">❌</span>Authentication</h3><p>Auth error: ' + res.status + '</p>';
                }
                return res.text();
            })
            .then(text => {
                if (text.includes('error') || text.includes('Error')) {
                    document.getElementById('error-section').style.display = 'block';
                    document.getElementById('error-display').innerText = text;
                }
            });
        
        // Check API
        fetch('/api/market/overview')
            .then(res => {
                const card = document.getElementById('api-status');
                if (res.ok) {
                    card.className = 'status-card success';
                    card.innerHTML = '<h3><span class="icon">✅</span>API Status</h3><p>API endpoints working</p>';
                } else if (res.status === 401) {
                    card.className = 'status-card warning';
                    card.innerHTML = '<h3><span class="icon">🔐</span>API Status</h3><p>API requires authentication</p>';
                } else {
                    card.className = 'status-card error';
                    card.innerHTML = '<h3><span class="icon">❌</span>API Status</h3><p>API error: ' + res.status + '</p>';
                }
            });
        
        async function testLogin() {
            const username = document.getElementById('username').value;
            const password = document.getElementById('password').value;
            
            try {
                const res = await fetch('/api/login', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    credentials: 'include',
                    body: JSON.stringify({username, password})
                });
                
                const data = await res.json();
                document.getElementById('response').innerText = 
                    res.ok ? 'Login successful!\n\n' + JSON.stringify(data, null, 2) : 
                    'Login failed: ' + JSON.stringify(data, null, 2);
                    
                if (res.ok) {
                    setTimeout(() => location.reload(), 1000);
                }
            } catch (err) {
                document.getElementById('response').innerText = 'Error: ' + err.message;
            }
        }
        
        async function checkAuth() {
            try {
                const res = await fetch('/api/auth/user', {credentials: 'include'});
                const data = res.ok ? await res.json() : await res.text();
                document.getElementById('response').innerText = 
                    res.ok ? 'Authenticated as:\n\n' + JSON.stringify(data, null, 2) : 
                    'Not authenticated: ' + data;
            } catch (err) {
                document.getElementById('response').innerText = 'Error: ' + err.message;
            }
        }
        
        async function logout() {
            try {
                const res = await fetch('/api/logout', {
                    method: 'POST',
                    credentials: 'include'
                });
                document.getElementById('response').innerText = 
                    res.ok ? 'Logout successful!' : 'Logout failed';
                if (res.ok) {
                    setTimeout(() => location.reload(), 1000);
                }
            } catch (err) {
                document.getElementById('response').innerText = 'Error: ' + err.message;
            }
        }
        
        // Auto-check auth on load
        checkAuth();
    </script>
</body>
</html>
